name: Deploy to Firebase Hosting on Merge
'on':
  push:
    branches:
      - main
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: |
          echo "VITE_FIREBASE_API_KEY=AIzaSyBMG2vucOhFJyxvMDxb83wt9Cm4NpgYHBg" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=strvn-dev.firebaseapp.com" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=strvn-dev" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=strvn-dev.firebasestorage.app" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=457957259550" >> .env
          echo "VITE_FIREBASE_APP_ID=1:457957259550:web:1173fbab46e09702eef10f" >> .env
          echo "VITE_API_URL=https://mini-hcm-server.onrender.com" >> .env
          npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STRVN_DEV }}'
          channelId: live
          projectId: strvn-dev
